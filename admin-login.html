<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Login — LiusCine</title>
<link rel="stylesheet" href="style.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }

  /* Background effects */
  .bg-glow-1 {
    position: fixed; top: -100px; left: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(108,0,255,0.08), transparent);
    border-radius: 50%; pointer-events: none;
  }
  .bg-glow-2 {
    position: fixed; bottom: -100px; right: -100px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(139,92,246,0.06), transparent);
    border-radius: 50%; pointer-events: none;
  }
  .bg-grid {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(108,0,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,0,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  /* Login box */
  .admin-login-box {
    width: 100%;
    max-width: 420px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px 36px;
    position: relative;
    z-index: 1;
    box-shadow: 0 24px 80px rgba(0,0,0,0.4), 0 0 60px rgba(108,0,255,0.08);
    animation: boxIn 0.6s ease both;
  }

  @keyframes boxIn {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .admin-login-logo {
    text-align: center;
    margin-bottom: 8px;
  }

  .admin-login-logo .logo {
    font-size: 28px;
    font-weight: 900;
    color: var(--text);
    text-decoration: none;
  }

  .admin-login-logo .logo span { color: var(--accent); }

  .admin-badge-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.25);
    color: var(--red);
    font-size: 11px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 100px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-top: 8px;
  }

  .admin-login-title {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -0.5px;
    margin: 24px 0 6px;
  }

  .admin-login-sub {
    font-size: 13px;
    color: var(--muted);
    font-weight: 400;
    margin-bottom: 28px;
  }

  /* Lock icon */
  .lock-icon {
    width: 64px; height: 64px;
    background: rgba(108,0,255,0.1);
    border: 1px solid rgba(108,0,255,0.2);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    color: var(--accent);
    margin: 0 auto 20px;
  }

  /* Form */
  .admin-form { display: flex; flex-direction: column; gap: 0; }

  .input-with-icon {
    position: relative;
    margin-bottom: 16px;
  }

  .input-with-icon i {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
    pointer-events: none;
  }

  .input-with-icon input {
    width: 100%;
    padding: 13px 16px 13px 40px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Lexend', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-with-icon input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(139,92,246,0.1);
  }

  .input-with-icon input::placeholder { color: var(--muted); }

  /* Show password toggle */
  .eye-toggle {
    position: absolute;
    right: 14px; top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    padding: 4px;
    transition: color 0.2s;
  }
  .eye-toggle:hover { color: var(--accent); }

  .admin-login-btn {
    width: 100%;
    padding: 14px;
    background: var(--purple-mid);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'Lexend', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 4px;
    box-shadow: 0 0 24px rgba(108,0,255,0.3);
  }

  .admin-login-btn:hover {
    background: var(--purple-glow);
    transform: translateY(-1px);
    box-shadow: 0 8px 32px rgba(108,0,255,0.4);
  }

  .admin-login-btn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
    transform: none;
  }

  /* Error message */
  .error-msg {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--red);
    font-weight: 500;
    margin-bottom: 16px;
    display: none;
    align-items: center;
    gap: 10px;
  }
  .error-msg.show { display: flex; }

  /* Divider */
  .login-divider {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin: 20px 0 16px;
    position: relative;
  }
  .login-divider::before, .login-divider::after {
    content: '';
    position: absolute;
    top: 50%; width: 42%;
    height: 1px;
    background: var(--border);
  }
  .login-divider::before { left: 0; }
  .login-divider::after  { right: 0; }

  /* Google button */
  .google-btn-admin {
    width: 100%;
    padding: 13px;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 10px;
    font-family: 'Lexend', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.2s;
  }
  .google-btn-admin:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(255,255,255,0.15);
  }

  /* Footer note */
  .login-footer-note {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 24px;
    font-weight: 400;
    line-height: 1.6;
  }

  .login-footer-note a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
  }

  /* Security notice */
  .security-notice {
    background: rgba(108,0,255,0.06);
    border: 1px solid rgba(108,0,255,0.15);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 12px;
    color: var(--muted);
    margin-top: 20px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    line-height: 1.6;
    font-weight: 400;
  }
  .security-notice i { color: var(--accent); margin-top: 1px; flex-shrink: 0; }

  /* Attempts counter */
  .attempts-badge {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 12px;
  }

  @media (max-width: 480px) {
    .admin-login-box { padding: 28px 20px; margin: 16px; border-radius: 16px; }
    .admin-login-title { font-size: 20px; }
  }
</style>
</head>
<body>

<div class="bg-glow-1"></div>
<div class="bg-glow-2"></div>
<div class="bg-grid"></div>

<div class="admin-login-box">

  <div class="admin-login-logo">
    <a href="index.html" class="logo">Lius<span>Cine</span></a>
    <div>
      <span class="admin-badge-label">
        <i class="fa-solid fa-shield-halved"></i> Admin Access Only
      </span>
    </div>
  </div>

  <div style="text-align:center;">
    <div class="lock-icon">
      <i class="fa-solid fa-lock"></i>
    </div>
    <h2 class="admin-login-title">Admin Panel</h2>
    <p class="admin-login-sub">Sign in with your admin credentials to continue</p>
  </div>

  <!-- Error message -->
  <div class="error-msg" id="errorMsg">
    <i class="fa-solid fa-circle-exclamation"></i>
    <span id="errorText">Invalid credentials. Access denied.</span>
  </div>

  <!-- Google Sign In (recommended) -->
  <button class="google-btn-admin" onclick="adminGoogleLogin()" id="googleBtn">
    <svg width="20" height="20" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </button>

  <div class="login-divider">or sign in with email</div>

  <!-- Email form -->
  <div class="admin-form">
    <div class="input-with-icon">
      <i class="fa-regular fa-envelope"></i>
      <input type="email" id="adminEmail" placeholder="Admin email address" autocomplete="email"/>
    </div>
    <div class="input-with-icon">
      <i class="fa-solid fa-lock"></i>
      <input type="password" id="adminPassword" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter') adminEmailLogin()"/>
      <button class="eye-toggle" onclick="togglePassword()" type="button" id="eyeBtn">
        <i class="fa-regular fa-eye" id="eyeIcon"></i>
      </button>
    </div>
    <button class="admin-login-btn" onclick="adminEmailLogin()" id="loginBtn">
      <i class="fa-solid fa-right-to-bracket"></i>
      Sign In to Admin Panel
    </button>
  </div>

  <div class="attempts-badge" id="attemptsBadge"></div>

  <div class="security-notice">
    <i class="fa-solid fa-shield-halved"></i>
    <span>This panel is restricted to <strong style="color:var(--text)">liuscreatives@gmail.com</strong> only. Unauthorized access attempts are logged.</span>
  </div>

  <p class="login-footer-note">
    Not the admin? <a href="index.html">← Go back to LiusCine</a>
  </p>

</div>

<div class="toast"></div>

<script type="module">
  import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import {
    getAuth,
    signInWithPopup,
    signInWithEmailAndPassword,
    GoogleAuthProvider,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBnPxRn13A1bEo901P8O3VE5X_nKvclFpI",
    authDomain: "liuspros.firebaseapp.com",
    projectId: "liuspros",
    storageBucket: "liuspros.firebasestorage.app",
    messagingSenderId: "1072846880138",
    appId: "1:1072846880138:web:d095b5196563844e9edc73"
  };

  const ADMIN_EMAIL = "liuscreatives@gmail.com";
  // Reuse existing app if already initialised
  const app = getApps().length > 0 ? getApp() : initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const googleProvider = new GoogleAuthProvider();

  let failedAttempts = 0;
  let isLocked = false;

  // If already logged in as admin, redirect to admin panel
  onAuthStateChanged(auth, (user) => {
    if (user && user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) {
      window.location.href = "admin.html";
    }
  });

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    document.getElementById('errorText').textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 5000);
  }

  function setLoading(btn, loading, originalHTML) {
    btn.disabled = loading;
    btn.innerHTML = loading
      ? '<i class="fa-solid fa-spinner fa-spin"></i> Signing in...'
      : originalHTML;
  }

  function updateAttempts() {
    const badge = document.getElementById('attemptsBadge');
    if (failedAttempts > 0) {
      badge.textContent = `${failedAttempts} failed attempt${failedAttempts > 1 ? 's' : ''}`;
      badge.style.color = 'var(--red)';
    }
    if (failedAttempts >= 5) {
      isLocked = true;
      badge.textContent = 'Too many attempts. Try again in 2 minutes.';
      badge.style.color = 'var(--red)';
      document.getElementById('loginBtn').disabled = true;
      document.getElementById('googleBtn').disabled = true;
      setTimeout(() => {
        isLocked = false;
        failedAttempts = 0;
        badge.textContent = '';
        document.getElementById('loginBtn').disabled = false;
        document.getElementById('googleBtn').disabled = false;
      }, 120000);
    }
  }

  window.adminGoogleLogin = async function() {
    if (isLocked) { showError('Too many failed attempts. Please wait.'); return; }
    const btn = document.getElementById('googleBtn');
    const orig = btn.innerHTML;
    try {
      setLoading(btn, true, orig);
      const result = await signInWithPopup(auth, googleProvider);
      if (result.user.email.toLowerCase() !== ADMIN_EMAIL.toLowerCase()) {
        await auth.signOut();
        failedAttempts++;
        updateAttempts();
        showError('Access denied. This account is not an admin.');
        setLoading(btn, false, orig);
        return;
      }
      window.location.href = "admin.html";
    } catch(e) {
      failedAttempts++;
      updateAttempts();
      showError('Sign in failed: ' + e.message);
      setLoading(btn, false, orig);
    }
  };

  window.adminEmailLogin = async function() {
    if (isLocked) { showError('Too many failed attempts. Please wait.'); return; }
    const email    = document.getElementById('adminEmail').value.trim();
    const password = document.getElementById('adminPassword').value;
    if (!email || !password) { showError('Please enter your email and password.'); return; }

    const btn  = document.getElementById('loginBtn');
    const orig = btn.innerHTML;
    try {
      setLoading(btn, true, orig);
      const result = await signInWithEmailAndPassword(auth, email, password);
      if (result.user.email.toLowerCase() !== ADMIN_EMAIL.toLowerCase()) {
        await auth.signOut();
        failedAttempts++;
        updateAttempts();
        showError('Access denied. You are not an admin.');
        setLoading(btn, false, orig);
        return;
      }
      window.location.href = "admin.html";
    } catch(e) {
      failedAttempts++;
      updateAttempts();
      let msg = 'Invalid email or password.';
      if (e.code === 'auth/user-not-found')     msg = 'No account found with this email.';
      if (e.code === 'auth/wrong-password')     msg = 'Incorrect password. Try again.';
      if (e.code === 'auth/invalid-credential') msg = 'Invalid email or password.';
      showError(msg);
      setLoading(btn, false, orig);
    }
  };

  window.togglePassword = function() {
    const input   = document.getElementById('adminPassword');
    const icon    = document.getElementById('eyeIcon');
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    icon.className = isHidden ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye';
  };
</script>

</body>
</html>
