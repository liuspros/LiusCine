<script>
// ── HOMEPAGE UPGRADE — plain script, accessible from onclick ──
// This must NOT be type="module"
window.homepageUpgrade = function() {
  // Check if Paystack loaded
  if (!window.PaystackPop) {
    alert('Payment system is loading. Please wait 2 seconds and try again.');
    return;
  }

  // Check if user is logged in via stored session
  // We check localStorage for a Firebase auth token hint
  const isLoggedIn = localStorage.getItem('firebase:authUser:' + 
    Object.keys(localStorage).find(k => k.startsWith('firebase:authUser:'))?.split(':')[2] || 
    'liuspros') !== null;

  // Simpler check — just try to open Paystack, it will use email from prompt if needed
  // Best UX: if not logged in, send to login first
  const userDataKey = Object.keys(localStorage).find(k => k.includes('firebase') && k.includes('authUser'));
  let userEmail = null;
  if (userDataKey) {
    try {
      const userData = JSON.parse(localStorage.getItem(userDataKey));
      userEmail = userData?.email || null;
    } catch(e) {}
  }

  if (!userEmail) {
    // Not logged in — go to login, then come back to upgrade
    window.location.href = 'login.html?next=upgrade';
    return;
  }

  // Logged in — open Paystack
  const handler = window.PaystackPop.setup({
    key:      'pk_live_051bcbe2840110639b09a2ef72b70fdbcf6a6220',
    email:    userEmail,
    amount:   100000, // ₦1,000 in kobo
    currency: 'NGN',
    ref:      'LC-PREM-' + Date.now(),
    callback: function(response) {
      // Payment done — redirect to dashboard which will handle upgrade
      window.location.href = 'dashboard.html?upgraded=1&ref=' + response.reference;
    },
    onClose: function() {
      // User closed payment — do nothing
    }
  });
  handler.openIframe();
};
</script>

// ── MOBILE MENU ──
function toggleMenu() {
  var menu = document.getElementById('mobileMenu');
  var btn  = document.getElementById('hamburger');
  if (!menu || !btn) return;
  menu.classList.toggle('open');
  btn.classList.toggle('open');
  document.body.style.overflow = menu.classList.contains('open') ? 'hidden' : '';
}
document.addEventListener('click', function(e) {
  var menu = document.getElementById('mobileMenu');
  var btn  = document.getElementById('hamburger');
  if (menu && btn && menu.classList.contains('open') && !menu.contains(e.target) && !btn.contains(e.target)) {
    menu.classList.remove('open');
    btn.classList.remove('open');
    document.body.style.overflow = '';
  }
});

// ── LOAD MOVIES FROM FIRESTORE ──
var POSTERS = ['poster-a','poster-b','poster-c','poster-d','poster-e','poster-f','poster-g','poster-h'];

function loadMovies(genre) {
  var container = document.getElementById('moviesGridContainer');
  if (!container) return;
  container.innerHTML = '<div style="text-align:center;padding:48px 20px;color:var(--muted);"><i class="fa-solid fa-spinner fa-spin" style="font-size:32px;display:block;margin-bottom:12px;"></i><p>Loading movies...</p></div>';
  var q = genre
    ? _db.collection('movies').where('genre','==',genre).orderBy('createdAt','desc').limit(6)
    : _db.collection('movies').orderBy('createdAt','desc').limit(6);
  q.get().then(function(snap) {
    if (snap.empty) {
      container.innerHTML = '<div style="text-align:center;padding:64px 20px;"><i class="fa-solid fa-film" style="font-size:64px;color:var(--border2);display:block;margin-bottom:16px;"></i><h3 style="font-size:18px;font-weight:800;margin-bottom:8px;">No movies yet</h3><p style="font-size:14px;color:var(--muted);">Movies will appear here once the admin adds them.</p></div>';
      var hc = document.getElementById('heroCards');
      if (hc) hc.style.display = 'none';
      return;
    }
    var movies = [];
    snap.forEach(function(d){ movies.push(Object.assign({id:d.id}, d.data())); });
    // Hero cards
    var hc = document.getElementById('heroCards');
    if (hc) {
      hc.innerHTML = movies.slice(0,4).map(function(m,i){
        return '<div class="hero-card" onclick="window.location.href='movie.html?id='+m.id+''">' +
          '<div class="hc-poster '+POSTERS[i]+'">' + (m.posterUrl ? '<img src="'+m.posterUrl+'" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'"/>' : '<i class="fa-solid fa-film" style="font-size:32px;color:rgba(139,92,246,0.4)"></i>') + '</div>' +
          '<div class="hc-info"><div class="hc-title">'+(m.title||'')+'</div><div class="hc-meta"><span>'+(m.year||'')+'</span><span style="color:var(--gold)"><i class="fa-solid fa-star"></i> '+(m.rating||'—')+'</span></div></div></div>';
      }).join('');
    }
    // Movies grid
    var html = '<div class="movies-grid">';
    movies.forEach(function(m,i){
      var badge = m.access==='premium' ? '<span class="badge badge-premium">PREMIUM</span>' : (i===0 ? '<span class="badge badge-new">NEW</span>' : '<span class="badge badge-free">FREE</span>');
      html += '<div class="movie-card" onclick="window.location.href='movie.html?id='+m.id+''">' +
        '<div class="movie-poster '+POSTERS[i%POSTERS.length]+'">' +
        (m.posterUrl ? '<img src="'+m.posterUrl+'" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;" onerror="this.style.display='none'"/>' : '<i class="fa-solid fa-film" style="font-size:36px;color:rgba(139,92,246,0.3)"></i>') +
        '<div class="movie-card-badges">'+badge+'</div><div class="movie-overlay"><div class="play-circle"><i class="fa-solid fa-play"></i></div></div></div>' +
        '<div class="movie-info"><div class="movie-title">'+(m.title||'')+'</div><div class="movie-meta"><span>'+(m.year||'')+' · '+(m.genre||'')+'</span><span class="movie-rating"><i class="fa-solid fa-star"></i> '+(m.rating||'—')+'</span></div></div></div>';
    });
    html += '</div>';
    container.innerHTML = html;
  }).catch(function(e) {
    container.innerHTML = '<div style="text-align:center;padding:48px;color:var(--muted);"><i class="fa-solid fa-triangle-exclamation" style="font-size:32px;display:block;margin-bottom:12px;"></i><p>Could not load movies.</p></div>';
  });
}

// Genre pills
document.addEventListener('DOMContentLoaded', function() {
  loadMovies('');
  document.querySelectorAll('#genrePills .genre-pill').forEach(function(pill) {
    pill.addEventListener('click', function() {
      document.querySelectorAll('#genrePills .genre-pill').forEach(function(p){ p.classList.remove('active'); });
      pill.classList.add('active');
      loadMovies(pill.dataset.genre || '');
    });
  });
  // Scroll reveals
  var els = document.querySelectorAll('.reveal');
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e,i) {
      if (e.isIntersecting) { setTimeout(function(){ e.target.classList.add('visible'); }, i*80); obs.unobserve(e.target); }
    });
  }, {threshold:0.08});
  els.forEach(function(el){ obs.observe(el); });
});
</script>
